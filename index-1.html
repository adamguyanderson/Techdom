<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>
<style>
body{background:#1b1b1b;color:white;font-family:Arial,sans-serif;margin:0;padding:20px;}
.container{max-width:900px;margin:auto;background:#2b2b2b;border-radius:15px;padding:25px;}
h1{text-align:center;margin-bottom:25px;}
.main{display:flex;gap:25px;}
.left{flex:3;}
.right{flex:1.6;border-left:2px solid #555;padding-left:20px;display:flex;flex-direction:column;}
input[type=text]{width:100%;padding:14px;font-size:18px;border:none;border-radius:8px;margin-bottom:18px;box-sizing:border-box;}
#lines{width:80px;text-align:center;font-size:20px;}
button{width:100%;min-height:80px;padding:14px 10px;margin:8px 0;font-size:17px;border:none;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.2;}
button span:first-child{font-size:17px;font-weight:600;}
button span:last-child{font-size:14px;opacity:.9;}
.buttonSpacer{flex:1;min-height:0;}
#status{text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="container">
<h1>Techdom Control Panel</h1>
<div class="main">
<div class="left">
<input id="phrase" type="text" placeholder="Enter text">
<button onclick="displayText()">Display On Device</button>
<button onclick="speakText()">Speak</button>
<button onclick="hideText()">Remove Text</button>
<button onclick="openSite()">Webpage Opener</button>
<button onclick="setWallpaper()">Wallpaper</button>
</div>
<div class="right">
<input id="lines" type="text" maxlength="2" placeholder="#">
<button onclick="setLines()"># Of Lines</button>
<button onclick="endLines()"><span>Good-Boy</span><span>(Stop Lines)</span></button>
<div class="buttonSpacer"></div>
<button onclick="sayIt()">Say</button>
</div></div><div id="status"></div></div>
<script>
const webhook="https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";
function fire(url){fetch(url,{method:"GET",mode:"no-cors"});document.getElementById("status").innerHTML="Command Sent";}
function displayText(){const t=encodeURIComponent(document.getElementById("phrase").value);fire(webhook+"?tempvar=displaytext&text="+t);}
function speakText(){const t=encodeURIComponent(document.getElementById("phrase").value);fire(webhook+"?tempvar=speaktext&text="+t);}
function hideText(){fire(webhook+"?tempvar=off");}
function setLines(){const t=encodeURIComponent(document.getElementById("phrase").value);const l=encodeURIComponent(document.getElementById("lines").value);fire(webhook+"?tempvar=linesremaining&text="+t+"&lines_remaining="+l);}
function openSite(){const t=encodeURIComponent(document.getElementById("phrase").value);fire(webhook+"?tempvar=opensite&text="+t);}
function endLines(){fire(webhook+"?tempvar=Endlines");}
function setWallpaper(){const t=encodeURIComponent(document.getElementById("phrase").value);fire(webhook+"?tempvar=wallpaper&text="+t);}
function sayIt(){
let text=document.getElementById("phrase").value;
const reps=[
[/\bI'm\b/gi,"I am"],[/\bI've\b/gi,"I have"],[/\bI'll\b/gi,"I will"],[/\bI'd\b/gi,"I would"],
[/\byou're\b/gi,"you are"],[/\byou've\b/gi,"you have"],[/\byou'll\b/gi,"you will"],[/\byou'd\b/gi,"you would"],
[/\bhe's\b/gi,"he is"],[/\bshe's\b/gi,"she is"],[/\bit's\b/gi,"it is"],[/\bwe're\b/gi,"we are"],
[/\bthey're\b/gi,"they are"],[/\bcan't\b/gi,"cannot"],[/\bwon't\b/gi,"will not"],[/\bdon't\b/gi,"do not"],
[/\bdoesn't\b/gi,"does not"],[/\bdidn't\b/gi,"did not"],[/\bisn't\b/gi,"is not"],[/\baren't\b/gi,"are not"],
[/\bwasn't\b/gi,"was not"],[/\bweren't\b/gi,"were not"],[/\bhaven't\b/gi,"have not"],[/\bhasn't\b/gi,"has not"],
[/\bhadn't\b/gi,"had not"],[/\bshouldn't\b/gi,"should not"],[/\bwouldn't\b/gi,"would not"],[/\bcouldn't\b/gi,"could not"],
[/\bmustn't\b/gi,"must not"]
];
reps.forEach(r=>text=text.replace(r[0],r[1]));
text=text.replace(/[.,!?;:'"(){}\[\]<>\/\\`~@#$%^&*_+=|-]/g,"");
text=text.replace(/\s+/g," ").trim();
fire(webhook+"?tempvar=sayit&text="+encodeURIComponent(text));
}
</script></body></html>
