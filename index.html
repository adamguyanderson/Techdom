<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>

<style>
body {
  background: radial-gradient(circle at top, #0a0a0a 0%, #000 100%);
  color: #e0e0e0;
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 40px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: linear-gradient(145deg, #111 0%, #1a1a1a 100%);
  border: 2px solid #400000;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
  padding: 30px;
}

h1 {
  text-align: center;
  font-size: 2.5em;
  color: #ff1a1a;
  text-shadow: 0 0 15px #ff0000;
  letter-spacing: 2px;
  margin-bottom: 30px;
}

.main {
  display: flex;
  gap: 30px;
}

.left, .right {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.left {
  flex: 3;
}

.right {
  flex: 1;
  border-left: 2px solid #550000;
  padding-left: 30px;
}

input[type=text] {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border: 1px solid #550000;
  border-radius: 10px;
  background: #0d0d0d;
  color: #ff1a1a;
  box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.3);
  margin-bottom: 18px;
}

input::placeholder {
  color: #aa0000;
}

button {
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  font-size: 18px;
  border: 1px solid #550000;
  border-radius: 10px;
  background: linear-gradient(145deg, #1a0000, #330000);
  color: #ff1a1a;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

button:hover {
  background: linear-gradient(145deg, #330000, #550000);
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
  transform: scale(1.03);
}

.icon {
  width: 24px;
  height: 24px;
  fill: #ff1a1a;
  filter: drop-shadow(0 0 6px #ff0000);
}

#status {
  text-align: center;
  margin-top: 25px;
  font-size: 1.2em;
  color: #ff4d4d;
  text-shadow: 0 0 10px #ff0000;
}
</style>
</head>

<body>

<div class="container">
  <h1>Techdom Control Panel</h1>

  <div class="main">
    <div class="left">

      <input id="phrase" type="text" placeholder="Enter text...">

      <!-- Display On Device (Chain Icon) -->
      <button onclick="displayText()">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M10.1 13.9l-1.4 1.4c-1.6 1.6-4.1 1.6-5.7 0s-1.6-4.1 0-5.7l3.5-3.5c1.6-1.6 4.1-1.6 5.7 0l1.4 1.4-2.1 2.1-1.4-1.4c-.6-.6-1.6-.6-2.1 0L5.7 10c-.6.6-.6 1.6 0 2.1s1.6.6 2.1 0l1.4-1.4 2.1 2.2zm3.8-3.8l1.4-1.4c.6-.6 1.6-.6 2.1 0l3.5 3.5c.6.6.6 1.6 0 2.1s-1.6.6-2.1 0l-1.4-1.4-2.1 2.1 1.4 1.4c1.6 1.6 4.1 1.6 5.7 0s1.6-4.1 0-5.7l-3.5-3.5c-1.6-1.6-4.1-1.6-5.7 0l-1.4 1.4 2.1 2.1z"/>
        </svg>
        Display On Device
      </button>

      <!-- Speak (Lips Icon) -->
      <button onclick="speakText()">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M12 4c-4 0-7 3-9 5 2 2 5 5 9 5s7-3 9-5c-2-2-5-5-9-5zm0 8c-2 0-4-1-6-3 2-2 4-3 6-3s4 1 6 3c-2 2-4 3-6 3z"/>
        </svg>
        Speak
      </button>

      <!-- Remove Text (Flame Icon) -->
      <button onclick="hideText()">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M12 2s4 4 4 8-4 6-4 6-4-2-4-6 4-8 4-8zm0 20c-2.2 0-4-1.8-4-4h8c0 2.2-1.8 4-4 4z"/>
        </svg>
        Remove Text
      </button>

    </div>

    <div class="right">

      <input id="lines" type="text" maxlength="2" placeholder="#">

      <!-- # Of Lines (Candle Icon) -->
      <button onclick="setLines()">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M12 2l2 4h-4l2-4zm-2 6h4v12h-4V8zm-1 12h6v2H9v-2z"/>
        </svg>
        # Of Lines
      </button>

    </div>
  </div>

  <div id="status"></div>
</div>

<script>
const webhook = "https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function fire(url) {
  fetch(url, { method: "GET", mode: "no-cors" });
  document.getElementById("status").innerHTML = "Command Sent";
}

function displayText() {
  const text = encodeURIComponent(document.getElementById("phrase").value);
  fire(webhook + "?tempvar=displaytext&text=" + text);
}

function speakText() {
  const text = encodeURIComponent(document.getElementById("phrase").value);
  fire(webhook + "?tempvar=speaktext&text=" + text);
}

function hideText() {
  fire(webhook + "?tempvar=off");
}

function setLines() {
  const text = encodeURIComponent(document.getElementById("phrase").value);
  const lines = encodeURIComponent(document.getElementById("lines").value);
  fire(webhook + "?tempvar=linesremaining&text=" + text + "&lines_remaining=" + lines);
}
</script>

</body>
</html>
