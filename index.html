<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>

<style>
body{
margin:0;
padding:14px;
background:#1b1b1b;
color:#fff;
font-family:Arial, sans-serif;
}

.container{
max-width:900px;
margin:auto;
background:#2b2b2b;
padding:14px;
border-radius:12px;
}

h1{
text-align:center;
margin:8px 0 14px;
font-size:20px;
}

.top{
display:flex;
gap:8px;
margin-bottom:10px;
}

#phrase{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#444;
color:#fff;
font-size:15px;
}

#phrase::placeholder{
color:#bbb;
}

button{
background:#555;
border:none;
border-radius:8px;
color:#fff;
padding:10px;
font-size:13px;
cursor:pointer;
}

button:active{opacity:.8;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
position:relative;
}

.grid::before{
content:"";
position:absolute;
top:0;
bottom:0;
left:50%;
width:1px;
background:#555;
transform:translateX(-0.5px);
}

.box{
border:1px solid #555;
border-radius:10px;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
background:#303030;
}

.row{
display:flex;
gap:8px;
align-items:center;
}

.small{
width:60px;
padding:10px;
border:none;
border-radius:8px;
background:#444;
color:#fff;
text-align:center;
}

.hint{
font-size:11px;
opacity:.75;
line-height:1.3;
}

hr{
border:0;
border-top:1px solid #555;
margin:10px 0;
}

.status{
text-align:center;
font-size:12px;
opacity:.7;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Techdom Control Panel</h1>

<div class="top">
<input id="phrase" placeholder="Text / URL / image.jpg">
<button onclick="clearAll()">Clear</button>
</div>

<div class="grid">

<div class="box">

<div class="row">
<button onclick="send('displaytext')">Display</button>
<button onclick="send('off')">Remove</button>
</div>

<button onclick="send('androidspeak')">Android Speaks</button>

<hr>

<button onclick="send('openurl')">Open URL</button>

</div>

<div class="box">

<div class="row">
<input id="lines" class="small" placeholder="#">
<button onclick="send('typ4me')">Type 4 Me</button>
</div>

<button onclick="send('goodboy')">Good Boy</button>

</div>

</div>

<hr>

<div class="grid">

<div class="box">

<button onclick="send('wallpaper')">Set Wallpaper</button>

<div class="row">
<button onclick="send('wp-lock')">🔒</button>
<button onclick="send('wp-unlock')">🔓</button>
</div>

</div>

<div class="box">

<div class="row">
<button onclick="send('speak4me')">Speak 4 Me</button>
<button onclick="send('cancelsays')">✕</button>
</div>

<div class="hint">
Speech rules:<br>
I am ✓ &nbsp; I'm / Im ✗<br>
No punctuation
</div>

</div>

</div>

<div class="status" id="status"></div>

</div>

<script>

const webhook="https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function send(type){
let t=document.getElementById("phrase").value||"";
let l=document.getElementById("lines").value||"";
let url=webhook+"?tempvar="+type;
if(t)url+="&text="+encodeURIComponent(t);
if(type==="typ4me"&&l)url+="&lines_remaining="+encodeURIComponent(l);
fetch(url,{method:"GET",mode:"no-cors"});
setStatus("Sent");
}

function clearAll(){
document.getElementById("phrase").value="";
document.getElementById("lines").value="";
setStatus("Cleared");
}

function setStatus(m){
let s=document.getElementById("status");
s.innerText=m;
setTimeout(()=>s.innerText="",1500);
}

</script>

</body>
</html>
