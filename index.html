<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>

<style>

/* =========================
   BACKDROP (RESTRICTED ENVIRONMENT)
========================= */
body{
    margin:0;
    padding:22px;
    font-family:Arial, sans-serif;
    color:#f2f2f2;
    min-height:100vh;

    background:
      radial-gradient(circle at 50% 20%, #1a0000 0%, #000 60%),
      linear-gradient(90deg, #050505 1px, transparent 1px),
      linear-gradient(0deg, #050505 1px, transparent 1px);

    background-size:100% 100%, 18px 18px, 18px 18px;
}

/* =========================
   MAIN CONTAINER (SEALED MODULE)
========================= */
.container{
    max-width:900px;
    margin:auto;
    padding:32px;

    background:linear-gradient(145deg, #0a0a0a, #1a0000);

    border-radius:16px;

    border:1px solid rgba(255,0,50,0.18);

    box-shadow:
        0 0 60px rgba(0,0,0,0.9),
        inset 0 0 30px rgba(0,0,0,0.9);

    position:relative;
}

/* sealed frame lines */
.container::before{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:12px;

    border:1px solid rgba(255,0,60,0.08);
    box-shadow:inset 0 0 25px rgba(0,0,0,0.8);

    pointer-events:none;
}

/* top warning strip */
.container::after{
    content:"RESTRICTED INTERFACE — AUTHORIZED CONTROL ONLY";
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);

    font-size:10px;
    letter-spacing:4px;

    color:rgba(255,0,60,0.65);
}

/* =========================
   TITLE (AUTHORITY HEADER)
========================= */
h1{
    text-align:center;
    margin-bottom:6px;

    letter-spacing:6px;
    font-weight:800;

    color:#ff002b;

    text-shadow:
        0 0 10px rgba(255,0,50,0.25),
        0 0 30px rgba(0,0,0,0.8);
}

h1::after{
    content:"";
    display:block;
    width:200px;
    height:1px;
    margin:10px auto 0;

    background:rgba(255,0,60,0.35);
}

/* system identity strip */
.system-header{
    text-align:center;
    margin:14px 0 18px;
    padding:10px;

    border-top:1px solid rgba(255,0,60,0.15);
    border-bottom:1px solid rgba(255,0,60,0.15);

    letter-spacing:3px;
    font-size:11px;
    color:rgba(255,255,255,0.6);
}

/* =========================
   LAYOUT
========================= */
.main{
    display:flex;
    gap:22px;
}

.left{ flex:3; }
.right{
    flex:1;
    border-left:1px solid rgba(255,255,255,0.08);
    padding-left:20px;
}

/* section labels */
.panel-mark{
    text-align:center;
    font-size:11px;
    letter-spacing:5px;

    color:rgba(255,0,60,0.7);

    margin-bottom:10px;
    padding:6px 0;

    border:1px solid rgba(255,0,60,0.12);
}

/* =========================
   INPUTS (CONTROL FIELDS)
========================= */
input[type=text]{
    width:100%;
    padding:14px;
    font-size:16px;

    border-radius:10px;

    border:1px solid rgba(255,0,60,0.15);

    background:#0b0b0b;

    color:#fff;

    outline:none;

    box-shadow:inset 0 0 12px rgba(0,0,0,0.9);

    margin-bottom:12px;
}

input[type=text]:focus{
    border-color:rgba(255,0,60,0.6);
}

/* =========================
   BUTTONS (SEALED COMMAND MODULES)
========================= */
button{
    width:100%;
    padding:14px;
    margin:8px 0;

    font-size:15px;
    font-weight:700;

    border:none;
    border-radius:10px;

    cursor:pointer;

    color:#fff;

    background:linear-gradient(145deg, #1a0000, #0a0a0a);

    box-shadow:
        0 10px 20px rgba(0,0,0,0.85),
        inset 0 1px 0 rgba(255,255,255,0.05);

    position:relative;
    overflow:hidden;

    transition:0.15s ease;
}

/* cryptic sigil system */
button::before{
    content:"⟡";
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    opacity:0.6;
}

button::after{
    content:"⟠";
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    opacity:0.6;
}

button:hover{
    transform:translateY(-1px);
    border:1px solid rgba(255,0,60,0.25);
}

button:active{
    transform:translateY(1px);
}

/* =========================
   STATUS (SYSTEM RESPONSE)
========================= */
#status{
    text-align:center;
    margin-top:18px;
    color:#ff0033;
    font-weight:bold;
    letter-spacing:2px;
}

/* =========================
   MOBILE
========================= */
@media (max-width:700px){
    .main{ flex-direction:column; }

    .right{
        border-left:none;
        border-top:1px solid rgba(255,255,255,0.08);
        padding-left:0;
        padding-top:18px;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>TECHDOM CONTROL PANEL</h1>

<div class="system-header">
    SEALED COMMAND NODE • MACRODROID LINK ACTIVE • INPUT VERIFIED
</div>

<div class="main">

<div class="left">

<div class="panel-mark">COMMAND NODE</div>

<input id="phrase" type="text" placeholder="Enter text">

<button onclick="displayText()">Display On Device</button>
<button onclick="speakText()">Speak</button>
<button onclick="hideText()">Remove Text</button>

</div>

<div class="right">

<div class="panel-mark">CONFIG NODE</div>

<input id="lines" type="text" maxlength="2" placeholder="#">

<button onclick="setLines()"># Of Lines</button>

</div>

</div>

<div id="status"></div>

</div>

<script>

const webhook =
"https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function fire(url){
fetch(url,{method:"GET",mode:"no-cors"});
document.getElementById("status").innerHTML="COMMAND EXECUTED";
}

function displayText(){
const text = encodeURIComponent(document.getElementById("phrase").value);
fire(webhook + "?tempvar=displaytext&text=" + text);
}

function speakText(){
const text = encodeURIComponent(document.getElementById("phrase").value);
fire(webhook + "?tempvar=speaktext&text=" + text);
}

function hideText(){
fire(webhook + "?tempvar=off");
}

function setLines(){
const text = encodeURIComponent(document.getElementById("phrase").value);
const lines = encodeURIComponent(document.getElementById("lines").value);

fire(
webhook +
"?tempvar=linesremaining" +
"&text=" + text +
"&lines_remaining=" + lines
);
}

</script>

</body>
</html>
