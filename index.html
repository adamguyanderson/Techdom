<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    color:#f5f5f5;

    /* 🖤 black leather-style background */
    background:
      radial-gradient(circle at 30% 20%, rgba(120,0,0,0.25), transparent 40%),
      radial-gradient(circle at 70% 60%, rgba(60,0,0,0.25), transparent 45%),
      repeating-linear-gradient(
        45deg,
        #0a0a0a,
        #0a0a0a 10px,
        #0d0d0d 10px,
        #0d0d0d 20px
      );
}

/* 🧱 dark steel panel */
.container{
    max-width:900px;
    margin:auto;
    background:linear-gradient(145deg, #141414, #0b0b0b);
    border:1px solid #3a3a3a;
    border-radius:18px;
    padding:25px;

    box-shadow:
        0 0 25px rgba(120, 0, 0, 0.25),
        inset 0 0 18px rgba(0,0,0,0.8);
}

h1{
    text-align:center;
    margin-bottom:25px;

    /* 🔴 gothic crimson title */
    color:#b3001b;
    letter-spacing:3px;
    text-shadow:
        0 0 8px rgba(179,0,27,0.6),
        0 0 18px rgba(255,0,0,0.2);
}

/* layout */
.main{
    display:flex;
    gap:25px;
}

/* ⛓️ metallic divider */
.right{
    flex:1;
    border-left:2px solid;
    border-image:linear-gradient(to bottom, #666, #222, #666) 1;
    padding-left:25px;
}

.left{
    flex:3;
}

/* inputs */
input[type=text]{
    width:100%;
    padding:14px;
    font-size:18px;

    border:none;
    border-radius:10px;

    background:#0f0f0f;
    color:#fff;

    outline:none;

    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.9),
        inset 0 0 12px rgba(120,0,0,0.2);
    margin-bottom:18px;
}

input[type=text]:focus{
    box-shadow:
        0 0 10px rgba(179,0,27,0.6),
        inset 0 0 10px rgba(0,0,0,0.9);
}

/* 🔘 leather-style 3D buttons */
button{
    width:100%;
    padding:16px;
    margin:8px 0;
    font-size:18px;

    border:none;
    border-radius:12px;
    cursor:pointer;

    color:#fff;

    background:
      linear-gradient(145deg, #2a0000, #0a0a0a);

    box-shadow:
        4px 4px 10px rgba(0,0,0,0.8),
        -2px -2px 8px rgba(80,0,0,0.2),
        inset 0 0 8px rgba(120,0,0,0.25);

    transition:0.25s ease;
}

/* 🕯️ soft red glow */
button:hover{
    transform:translateY(-2px);
    box-shadow:
        0 0 12px rgba(179,0,27,0.5),
        0 8px 18px rgba(0,0,0,0.9),
        inset 0 0 10px rgba(179,0,27,0.3);
}

button:active{
    transform:translateY(1px);
}

/* status text */
#status{
    text-align:center;
    margin-top:20px;
    color:#b3001b;
    font-weight:bold;
    text-shadow:0 0 10px rgba(179,0,27,0.4);
}

/* 📱 mobile friendly */
@media (max-width:700px){
    .main{
        flex-direction:column;
    }

    .right{
        border-left:none;
        border-top:2px solid #333;
        padding-left:0;
        padding-top:20px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Techdom Control Panel</h1>

<div class="main">

<div class="left">

<input id="phrase" type="text" placeholder="Enter text">

<button onclick="displayText()">
Display On Device
</button>

<button onclick="speakText()">
Speak
</button>

<button onclick="hideText()">
Remove Text
</button>

</div>

<div class="right">

<input id="lines" type="text" maxlength="2" placeholder="#">

<button onclick="setLines()">
# Of Lines
</button>

</div>

</div>

<div id="status"></div>

</div>

<script>

const webhook =
"https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function fire(url){
fetch(url,{
method:"GET",
mode:"no-cors"
});

document.getElementById("status").innerHTML="Command Sent";
}

function displayText(){
const text = encodeURIComponent(document.getElementById("phrase").value);

fire(webhook + "?tempvar=displaytext&text=" + text);
}

function speakText(){
const text = encodeURIComponent(document.getElementById("phrase").value);

fire(webhook + "?tempvar=speaktext&text=" + text);
}

function hideText(){
fire(webhook + "?tempvar=off");
}

function setLines(){
const text = encodeURIComponent(document.getElementById("phrase").value);
const lines = encodeURIComponent(document.getElementById("lines").value);

fire(
webhook +
"?tempvar=linesremaining" +
"&text=" + text +
"&lines_remaining=" + lines
);
}

</script>

</body>
</html>
