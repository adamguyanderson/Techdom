<script>

const webhook =
"https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function setStatus(msg) {
    const el = document.getElementById("status");
    if (el) el.innerHTML = msg;
}

async function sendRequest(url, statusText = "Sending...") {

    setStatus(statusText);

    try {
        await fetch(url, {
            method: "GET",
            mode: "no-cors"
        });

        setStatus("Command Sent");

    } catch (e) {
        setStatus("Failed");
    }
}


// BUTTON 1: Display On Device (phrase + floaton)
async function displayOnDevice() {

    const input = document.getElementById("phrase");

    const text = encodeURIComponent(input ? input.value : "");

    // send phrase first
    await sendRequest(
        webhook + "?WebhookPhrase=" + text,
        "Sending text..."
    );

    // safety delay so MacroDroid updates variable
    await delay(1200);

    // trigger display
    await sendRequest(
        webhook + "?tempvar=floaton",
        "Displaying on device..."
    );
}


// BUTTON 2: Remove Text
function removeText() {
    sendRequest(
        webhook + "?tempvar=floatoff",
        "Removing text..."
    );
}

</script>
