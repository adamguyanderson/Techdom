<script>

const webhook =
"https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

    
async function sendRequest(url, statusText = "Sending...") {
    document.getElementById("status").innerHTML = statusText;

    try {
        await fetch(url, {
            method: "GET",
            mode: "no-cors"
        });

        document.getElementById("status").innerHTML = "Command Sent";

    } catch (e) {
        document.getElementById("status").innerHTML = "Failed";
    }
}


// BUTTON 1: Display On Device (text + floaton)
async function displayOnDevice() {

    const text = encodeURIComponent(
        document.getElementById("phrase").value
    );

    // send text first
    await sendRequest(
        webhook + "?WebhookPhrase=" + text,
        "Sending text..."
    );

    // small delay to ensure MacroDroid updates variable
    await delay(1200);

    // then trigger floaton
    await sendRequest(
        webhook + "?tempvar=floaton",
        "Displaying on device..."
    );
}


// BUTTON 2: Remove Text
function removeText() {
    sendRequest(
        webhook + "?tempvar=floatoff",
        "Removing text..."
    );
}

</script>
