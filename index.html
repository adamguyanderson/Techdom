<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>

    
<style>
body{
    background:#1b1b1b;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#2b2b2b;
    border-radius:15px;
    padding:25px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.main{
    display:flex;
    gap:25px;
}

.left{
    flex:3;
}

.right{
    flex:1;
    border-left:2px solid #555;
    padding-left:25px;
}

input[type=text]{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:8px;
    margin-bottom:18px;
    box-sizing:border-box;
}

#lines{
    width:80px;
    text-align:center;
    font-size:20px;
}

button{
    width:100%;
    padding:16px;
    margin:8px 0;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#status{
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Techdom Control Panel</h1>

<div class="main">

<div class="left">

<input
id="phrase"
type="text"
placeholder="Enter text">

<button onclick="displayText()">
Display On Device
</button>

<button onclick="speakText()">
Speak
</button>

<button onclick="hideText()">
Remove Text
</button>

</div>

<div class="right">

<input
id="lines"
type="text"
maxlength="2"
placeholder="#">

<button onclick="setLines()">
# Of Lines
</button>

</div>

</div>

<div id="status"></div>

</div>

<script>

const webhook =
"https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function fire(url){

fetch(url,{
method:"GET",
mode:"no-cors"
});

document.getElementById("status").innerHTML="Command Sent";

}

function displayText(){

const text =
encodeURIComponent(document.getElementById("phrase").value);

fire(
webhook +
"?tempvar=displaytext&text=" +
text
);

}

function speakText(){

const text =
encodeURIComponent(document.getElementById("phrase").value);

fire(
webhook +
"?tempvar=speaktext&text=" +
text
);

}

function hideText(){

fire(
webhook +
"?tempvar=off"
);

}

function setLines(){

const text =
encodeURIComponent(document.getElementById("phrase").value);

const lines =
encodeURIComponent(document.getElementById("lines").value);

fire(
webhook +
"?tempvar=linesremaining" +
"&text=" + text +
"&lines_remaining=" + lines
);

}

</script>

</body>
</html>
