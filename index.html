<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>

<style>

body{
margin:0;
padding:16px;
background: radial-gradient(circle at top,#141b26,#0b0f14);
color:#fff;
font-family:Arial,sans-serif;
}

.container{
max-width:900px;
margin:auto;
background:rgba(35,40,55,.85);
backdrop-filter:blur(12px);
padding:16px;
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 20px 50px rgba(0,0,0,.5);
}

h1{
text-align:center;
margin:10px 0 16px;
font-size:22px;
letter-spacing:1px;
}

.top{
display:flex;
gap:10px;
margin-bottom:12px;
}

#phrase{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,.12);
background:rgba(255,255,255,.05);
color:#fff;
font-size:14px;
}

button{
background:linear-gradient(180deg,#3a3f4a,#2a2f3a);
border:1px solid rgba(255,255,255,.1);
border-radius:10px;
color:#fff;
padding:10px;
font-size:13px;
cursor:pointer;
transition:.2s;
white-space:pre-line;
}

button:hover{
transform:translateY(-1px);
background:linear-gradient(180deg,#4a5a6a,#2a2f3a);
}

button:active{
transform:scale(.97);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
position:relative;
}

.grid::before{
content:"";
position:absolute;
top:0;
bottom:0;
left:50%;
width:1px;
background:rgba(255,255,255,.08);
}

.box{
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:flex;
gap:10px;
align-items:center;
}

.small{
width:65px;
padding:10px;
border-radius:8px;
border:1px solid rgba(255,255,255,.12);
background:rgba(0,0,0,.25);
color:#fff;
text-align:center;
}

hr{
border:0;
height:1px;
background:rgba(255,255,255,.1);
margin:10px 0;
}

.hint{
font-size:11px;
opacity:.75;
}

.status{
text-align:center;
font-size:12px;
opacity:.7;
margin-top:8px;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
.grid::before{display:none;}
}

</style>
</head>

<body>

<div class="container">

<h1>Techdom Control Panel</h1>

<div class="top">
<input id="phrase" placeholder="Text / URL / image.jpg">
<button onclick="clearAll()">Clear</button>
</div>

<div class="grid">

<div class="box">

<div class="row">
<button onclick="send('displaytext')">Display</button>
<button onclick="send('off')">Remove</button>
</div>

<hr>

<button onclick="send('androidspeak')">Android Speaks</button>

<hr>

<button onclick="send('openurl')">Open URL</button>

</div>

<div class="box">

<div class="row">
<input id="lines" class="small" placeholder="#">
<button onclick="send('typ4me')">START
TYPING
PERSON</button>
</div>

<button onclick="send('goodboy')">GOOD-BOY,
STOP TYPING</button>

</div>

</div>

<hr>

<div class="grid">

<div class="box">

<button onclick="send('wallpaper')">Set Wallpaper</button>

<div class="row">
<button onclick="send('wp-lock')">🔒</button>
<button onclick="send('wp-unlock')">🔓</button>
</div>

</div>

<div class="box">

<div class="row">
<button onclick="send('speak4me')">Speak 4 Me</button>
<button onclick="send('cancelsays')">✕</button>
</div>

<div class="hint">
Speech rules:<br>
I am ✓  I'm / Im ✗<br>
No punctuation
</div>

</div>

</div>

<div class="status" id="status"></div>

</div>

<script>

const webhook="https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function send(type){
let t=document.getElementById("phrase").value||"";
let l=document.getElementById("lines").value||"";
let url=webhook+"?tempvar="+type;
if(t)url+="&text="+encodeURIComponent(t);
if(type==="typ4me"&&l)url+="&lines_remaining="+encodeURIComponent(l);
fetch(url,{method:"GET",mode:"no-cors"});
setStatus("Sent");
}

function clearAll(){
document.getElementById("phrase").value="";
document.getElementById("lines").value="";
setStatus("Cleared");
}

function setStatus(m){
let s=document.getElementById("status");
s.innerText=m;
setTimeout(()=>s.innerText="",1500);
}

</script>

</body>
</html>
