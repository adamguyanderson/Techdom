<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>
 
<style>
body{
margin:0;
padding:16px;
background:#1b1b1b;
color:#fff;
font-family:Arial,sans-serif;
}

.container{
max-width:900px;
margin:auto;
background:#2b2b2b;
padding:18px;
border-radius:14px;
}

h1{
text-align:center;
margin:10px 0 16px;
font-size:20px;
}

.topRow{
display:flex;
gap:10px;
margin-bottom:10px;
}

#phrase{
flex:1;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
background:#444;
color:#fff;
}

#phrase::placeholder{
color:#bbb;
}

button{
border:none;
border-radius:8px;
background:#555;
color:#fff;
padding:10px;
font-size:14px;
cursor:pointer;
}

button:active{opacity:.8;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.section{
display:flex;
flex-direction:column;
gap:8px;
padding-top:8px;
}

.row{
display:flex;
gap:8px;
align-items:center;
}

.smallInput{
width:60px;
padding:10px;
text-align:center;
border:none;
border-radius:8px;
background:#444;
color:#fff;
}

.status{
text-align:center;
margin-top:10px;
font-size:13px;
opacity:.8;
}

hr{
border:0;
border-top:1px solid #444;
margin:10px 0;
}

.hint{
font-size:11px;
opacity:.7;
line-height:1.3;
}
</style>
</head>

<body>

<div class="container">

<h1>Techdom Control Panel</h1>

<div class="topRow">
<input id="phrase" placeholder="Text / URL / image.jpg">
<button onclick="clearAll()">Clear</button>
</div>

<div class="grid">

<!-- LEFT SIDE -->
<div class="section">

<div class="row">
<button onclick="send('displaytext')">Display</button>
<button onclick="send('off')">Remove</button>
</div>

<div class="row">
<button onclick="send('androidspeak')">Android Speaks</button>
</div>

<div class="row">
<button onclick="send('openurl')">Open URL</button>
</div>

<div class="row">
<button onclick="send('speak4me')">Speak 4 Me</button>
<button onclick="send('cancelsays')">✕</button>
</div>

</div>

<!-- RIGHT SIDE -->
<div class="section">

<div class="row">
<input id="lines" class="smallInput" placeholder="#">
<button onclick="send('typ4me')">Type 4 Me</button>
</div>

<div class="hint">
Use full words only.<br>
“I am” not “I’m” or “Im”.<br>
No punctuation.
</div>

<button onclick="send('goodboy')">Good Boy</button>

</div>

</div>

<hr>

<div class="grid">

<div class="section">

<button onclick="send('wallpaper')">Set Wallpaper</button>

<div class="row">
<button onclick="send('wp-lock')">🔒</button>
<button onclick="send('wp-unlock')">🔓</button>
</div>

</div>

</div>

<div id="status" class="status"></div>

</div>

<script>

const webhook = "https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function send(type){

let text = encodeURIComponent(document.getElementById("phrase").value || "");
let lines = encodeURIComponent(document.getElementById("lines")?.value || "");

let url = webhook + "?tempvar=" + type;

if(text) url += "&text=" + text;
if(lines && type === "typ4me") url += "&lines_remaining=" + lines;

fetch(url,{method:"GET",mode:"no-cors"});

setStatus("Command sent");
}

function clearAll(){
document.getElementById("phrase").value = "";
document.getElementById("lines").value = "";
setStatus("Cleared");
}

function setStatus(msg){
let s = document.getElementById("status");
s.innerText = msg;
setTimeout(()=>s.innerText="",2000);
}

</script>

</body>
</html>
