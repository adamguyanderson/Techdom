<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Panel</title>
</head>

<body style="background:#1b1b1b;color:white;text-align:center;font-family:Arial;">

<h2>Control Panel</h2>

<input id="phrase" placeholder="Text">

<br><br>

<button onclick="send()">Show Text</button>
<button onclick="speak()">Speak</button>
<button onclick="off()">Hide</button>

<script>

const url = "https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function getText(){
  return encodeURIComponent(document.getElementById("phrase").value);
}

function send(){
  fetch(url + "?tempvar=displaytext&text=" + getText(), {mode:"no-cors"});
}

function speak(){
  fetch(url + "?tempvar=speaktext&text=" + getText(), {mode:"no-cors"});
}

function off(){
  fetch(url + "?tempvar=off", {mode:"no-cors"});
}

</script>

</body>
</html>
