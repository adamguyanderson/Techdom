<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techdom Control Panel</title>
 
<style>
/* =========================
   GLOBAL FOUNDATION
========================= */
body{
    margin:0;
    padding:22px;
    font-family:Arial, sans-serif;
    color:#f2f2f2;

    /* deep industrial chamber background */
    background:
      radial-gradient(circle at 15% 10%, rgba(255,0,50,0.18), transparent 40%),
      radial-gradient(circle at 85% 30%, rgba(120,0,0,0.15), transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(0,0,0,1), #000 70%),
      repeating-linear-gradient(
        45deg,
        #060606,
        #060606 10px,
        #0a0a0a 10px,
        #0a0a0a 20px
      );
    min-height:100vh;
}

/* =========================
   MAIN PANEL (STEEL + LEATHER HYBRID)
========================= */
.container{
    max-width:900px;
    margin:auto;
    padding:30px;

    background:
      linear-gradient(145deg, rgba(18,18,18,0.96), rgba(8,8,8,0.98));

    border-radius:22px;

    border:1px solid rgba(255,0,60,0.18);

    /* layered depth */
    box-shadow:
        0 0 40px rgba(0,0,0,0.9),
        0 0 80px rgba(255,0,60,0.12),
        inset 0 0 30px rgba(0,0,0,0.95);

    position:relative;
    overflow:hidden;
}

/* subtle engraved frame lines */
.container::before{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);
    pointer-events:none;
}

/* =========================
   TITLE (ENGRAVED GOTHIC PLATE)
========================= */
h1{
    text-align:center;
    margin-bottom:25px;

    letter-spacing:5px;
    font-weight:700;

    color:#ff002b;

    text-shadow:
        0 0 10px rgba(255,0,60,0.6),
        0 0 25px rgba(255,0,60,0.25);

    position:relative;
}

/* ornamental underline */
h1::after{
    content:"";
    display:block;
    width:220px;
    height:2px;
    margin:12px auto 0;

    background:linear-gradient(
        to right,
        transparent,
        rgba(255,0,60,0.6),
        transparent
    );
}

/* =========================
   LAYOUT
========================= */
.main{
    display:flex;
    gap:25px;
}

/* =========================
   METAL DIVIDER
========================= */
.right{
    flex:1;
    border-left:2px solid transparent;
    border-image:linear-gradient(
        to bottom,
        #666,
        #111,
        rgba(255,0,60,0.6),
        #111,
        #666
    ) 1;

    padding-left:25px;
}

.left{
    flex:3;
}

/* =========================
   INPUTS (EMBOSSED LEATHER)
========================= */
input[type=text]{
    width:100%;
    padding:15px;
    font-size:18px;

    border-radius:14px;
    border:1px solid rgba(255,0,60,0.15);

    background:
      linear-gradient(145deg, #0b0b0b, #141414);

    color:#fff;

    outline:none;

    /* engraved depth */
    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.9),
        inset 0 0 18px rgba(255,0,60,0.08);

    margin-bottom:18px;
}

input[type=text]:focus{
    border-color:rgba(255,0,60,0.6);
    box-shadow:
        0 0 14px rgba(255,0,60,0.5),
        inset 0 0 18px rgba(0,0,0,0.9);
}

/* =========================
   BUTTONS (RIVETED LEATHER PANELS)
========================= */
button{
    width:100%;
    padding:16px;
    margin:8px 0;

    font-size:18px;
    font-weight:600;

    border:none;
    border-radius:16px;
    cursor:pointer;

    color:#fff;

    background:
      linear-gradient(145deg, #1a0a0a, #0a0a0a 60%, #2a0000);

    /* deep carved look */
    box-shadow:
        0 10px 20px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -6px 12px rgba(0,0,0,0.8),
        inset 0 0 10px rgba(255,0,60,0.12);

    position:relative;
    overflow:hidden;

    transition:0.25s ease;
}

/* subtle metallic rivet corners */
button::after{
    content:"";
    position:absolute;
    top:6px;
    left:6px;
    width:8px;
    height:8px;
    background:radial-gradient(circle, #888, #111);
    border-radius:50%;
    opacity:0.6;
}

/* moving light sweep */
button::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,0,60,0.25),
        transparent
    );
    transition:0.6s;
}

button:hover::before{
    left:120%;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
        0 0 18px rgba(255,0,60,0.45),
        0 14px 30px rgba(0,0,0,0.95),
        inset 0 0 14px rgba(255,0,60,0.2);
}

button:active{
    transform:translateY(1px);
}

/* =========================
   STATUS
========================= */
#status{
    text-align:center;
    margin-top:20px;

    color:#ff0033;
    font-weight:bold;

    text-shadow:0 0 10px rgba(255,0,60,0.5);
}

/* =========================
   MOBILE
========================= */
@media (max-width:700px){
    .main{
        flex-direction:column;
    }

    .right{
        border-left:none;
        border-top:2px solid rgba(255,0,60,0.25);
        padding-left:0;
        padding-top:20px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Techdom Control Panel</h1>

<div class="main">

<div class="left">

<input id="phrase" type="text" placeholder="Enter text">

<button onclick="displayText()">Display On Device</button>
<button onclick="speakText()">Speak</button>
<button onclick="hideText()">Remove Text</button>

</div>

<div class="right">

<input id="lines" type="text" maxlength="2" placeholder="#">

<button onclick="setLines()"># Of Lines</button>

</div>

</div>

<div id="status"></div>

</div>

<script>

const webhook =
"https://trigger.macrodroid.com/c4fe6afa-2d60-411b-a512-838356eccec6/techdom";

function fire(url){
fetch(url,{method:"GET",mode:"no-cors"});
document.getElementById("status").innerHTML="Command Sent";
}

function displayText(){
const text = encodeURIComponent(document.getElementById("phrase").value);
fire(webhook + "?tempvar=displaytext&text=" + text);
}

function speakText(){
const text = encodeURIComponent(document.getElementById("phrase").value);
fire(webhook + "?tempvar=speaktext&text=" + text);
}

function hideText(){
fire(webhook + "?tempvar=off");
}

function setLines(){
const text = encodeURIComponent(document.getElementById("phrase").value);
const lines = encodeURIComponent(document.getElementById("lines").value);

fire(
webhook +
"?tempvar=linesremaining" +
"&text=" + text +
"&lines_remaining=" + lines
);
}

</script>

</body>
</html>
